name: Build and Push Keycloak with Themes

on:
  workflow_dispatch:
    inputs:
      g2p_version:
        description: 'G2P version suffix (e.g. g2p1, g2p2, g2p3)'
        required: true
        type: string

env:
  BASE_TAG: "24.0.5-debian-12-r1"
  IMAGE_NAME: "openg2p/keycloak"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Validate g2p_version format
        run: |
          if [[ ! "${{ inputs.g2p_version }}" =~ ^g2p[0-9]+$ ]]; then
            echo "Error: g2p_version must match format 'g2pN' (e.g. g2p1, g2p2)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_hub_actor }}
          password: ${{ secrets.docker_hub_token }}

      # - name: Check tag does not already exist
      #   run: |
      #     TAG="${{ env.BASE_TAG }}-${{ inputs.g2p_version }}"
      #     if docker manifest inspect "${{ env.IMAGE_NAME }}:${TAG}" > /dev/null 2>&1; then
      #       echo "Error: Tag ${TAG} already exists on Docker Hub. Use a new g2p version."
      #       exit 1
      #     fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.BASE_TAG }}-${{ inputs.g2p_version }}
